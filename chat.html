<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الدردشات - ANIME_DIIB</title>
  <meta name="description" content="صفحة الدردشات في ANIME_DIIB - تواصل مع الأصدقاء وغرفة الدردشة العامة." />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body data-page="chat">
  <div class="app-topbar">
    <div class="container topbar-content">
      <a href="index.html" class="topbar-logo">ANIME_DIIB</a>
      <span class="topbar-tagline">تواصل مع أصدقائك في ANIME_DIIB</span>
      <div class="topbar-actions">
        <a href="notifications.html" class="topbar-icon" aria-label="الإشعارات">
          <i class="fas fa-bell"></i>
        </a>
        <div class="user-profile">
          <img id="topbar-user-avatar" data-avatar="user.png" alt="صورة المستخدم" class="user-avatar">
        </div>
      </div>
    </div>
  </div>

  <header>
    <div class="container header-content">
      <h1 class="logo">الدردشات</h1>
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="ابحث عن حساب أو صديق...">
        <i class="fas fa-search search-icon" aria-hidden="true"></i>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section chat-section">

         <div class="chat-panel-group">
          <h2 class="section-title">غرفة الدردشة العامة</h2>
          <a href="chatroom.html?room=public" class="chat-room-card">
            <div class="chat-room-info">
              <div>
                <h3>غرفة الدردشة العامة</h3>
                <p>انضم إلى المحادثة مع جميع الأصدقاء والمستخدمين.</p>
              </div>
              <i class="fas fa-angle-left"></i>
            </div>
          </a>
        </div>

        <div class="chat-panel-group">
          <h2 class="section-title">المحادثات</h2>
          <div id="chat-conversations" class="chat-list"></div>
        </div>

      <div class="chat-panel">
        <div class="chat-panel-group">
          <h2 class="section-title">الأصدقاء</h2>
          <div id="chat-friends" class="chat-list"></div>
        </div>
      </div>
    </section>
  </main>

  <button id="back-to-top" class="back-to-top" aria-label="العودة للأعلى">
    <i class="fas fa-arrow-up"></i>
  </button>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-label">الرئيسية</span>
    </a>
    <a href="anime.html" class="nav-item">
      <i class="fas fa-tv nav-icon"></i>
      <span class="nav-label">مسلسلات</span>
    </a>
    <a href="movie.html" class="nav-item">
      <i class="fas fa-film nav-icon"></i>
      <span class="nav-label">أفلام</span>
    </a>
    <a href="chat.html" class="nav-item active">
      <i class="fas fa-comments nav-icon"></i>
      <span class="nav-label">الدردشات</span>
    </a>
    <a href="account.html" class="nav-item">
      <i class="fas fa-user-circle nav-icon"></i>
      <span class="nav-label">الحساب</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script src="movies.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="main.js"></script>
  <script src="performance.js"></script>
  <script>
    // تحديث صورة المستخدم في الشريط العلوي
    function updateUserAvatar() {
      const topbarAvatar = document.getElementById('topbar-user-avatar');
      const savedUser = localStorage.getItem('userData');
      const userData = savedUser ? JSON.parse(savedUser) : null;
      
      if (userData && userData.avatar) {
        if (topbarAvatar) {
          topbarAvatar.src = userData.avatar;
          topbarAvatar.setAttribute('data-avatar', userData.avatar);
        }
      } else {
        if (topbarAvatar) {
          topbarAvatar.src = '';
          topbarAvatar.setAttribute('data-avatar', 'user.png');
        }
      }
    }
    
    // تحديث الصورة عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', function() {
      updateUserAvatar();
      if (typeof initTheme === 'function') {
        initTheme();
      }
    });
  </script>
</body>
</html>
