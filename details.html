<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="تفاصيل الأنمي وعرض الحلقات في ANIME_DIIB مع تصميم متجاوب وواضح.">
  <title>تفاصيل الأنمي - ANIME_DIIB</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body data-page="details">
  <div class="app-topbar">
    <div class="container topbar-content">
      <a href="index.html" class="topbar-logo">ANIME_DIIB</a>
      <span class="topbar-tagline">موقعك المفضل لمشاهدة الأنمي</span>
    </div>
  </div>

  <div class="details-header">
    
    <img id="anime-background" class="details-background" src="" alt="خلفية الأنمي">
    <div class="container details-content">
      <img id="anime-cover" class="details-cover" src="" alt="غلاف الأنمي">
      <div class="details-info">
        <h1 id="anime-title" class="details-title"></h1>
        <div class="details-meta">
          <span id="anime-year"></span>
          <span>•</span>
          <span id="anime-type"></span>
          <span>•</span>
          <span class="anime-rating" id="anime-rating"></span>
        </div>
        <div id="anime-genres" class="details-genre"></div>
        <p id="anime-description" class="details-description"></p>
      </div>
    </div>
  </div>

  <main class="container">
    <section class="section">
      <h2 class="section-title">الحلقات</h2>
      <div id="episodes-container" class="episodes-grid"></div>
    </section>
  </main>

  <button id="back-to-top" class="back-to-top" aria-label="العودة للأعلى">
    <i class="fas fa-arrow-up"></i>
  </button>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-label">الرئيسية</span>
    </a>
    <a href="anime.html" class="nav-item">
      <i class="fas fa-tv nav-icon"></i>
      <span class="nav-label">مسلسلات</span>
    </a>
    <a href="movie.html" class="nav-item">
      <i class="fas fa-film nav-icon"></i>
      <span class="nav-label">أفلام</span>
    </a>
    <a href="account.html" class="nav-item">
      <i class="fas fa-user-circle nav-icon"></i>
      <span class="nav-label">الحساب</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script src="main.js"></script>
  <script src="performance.js"></script>
</body>
</html>
