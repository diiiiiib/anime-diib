  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

<body data-page="chatroom">
  <div class="app-topbar">
    <div class="container topbar-content">
      <a href="index.html" class="topbar-logo">ANIME_DIIB</a>
      <span class="topbar-tagline">مكان المحادثات العامة والخاصة</span>
      <div class="topbar-actions">
        <a href="notifications.html" class="topbar-icon" aria-label="الإشعارات">
          <i class="fas fa-bell"></i>
        </a>
      </div>
    </div>
  </div>

  <header>
    <div class="container header-content">
      <h1 class="logo">غرفة الدردشة</h1>
      <div class="search-container">
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section chatroom-section">
      <div class="chatroom-header">
        <div>
          <span id="chatroom-type" class="chatroom-type">غرفة عامة</span>
          <h2 id="chatroom-title">الدردشة العامة</h2>
          <p id="chatroom-description">تحدث مع الجميع في غرفة دردشة عامة متاحة الآن.</p>
        </div>
        <a href="chat.html" class="action-btn">
          <i class="fas fa-arrow-right"></i>
          العودة
        </a>
      </div>

      <div id="chat-messages" class="chat-messages"></div>

      <form class="chat-input-form" onsubmit="event.preventDefault(); handleSendMessage();">
        <input id="chat-message-input" class="chat-input" type="text" placeholder="اكتب رسالة..." aria-label="اكتب رسالة" />
        <button class="action-btn" type="submit">
          <i class="fas fa-paper-plane"></i> إرسال
        </button>
      </form>
    </section>
  </main>

  <button id="back-to-top" class="back-to-top" aria-label="العودة للأعلى">
    <i class="fas fa-arrow-up"></i>
  </button>
